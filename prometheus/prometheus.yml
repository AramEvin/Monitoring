#All IP addresses shown are for testing purposes only and are provided as examples.
global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['192.168.121.26:9093'] #Testing IP

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['192.168.121.26:9090'] #Testing IP

  - job_name: 'node_exporter_kali1'
    static_configs:
      - targets: ['192.168.121.26:9100'] #Testing IP

  - job_name: 'node_exporter_kali2'
    static_configs:
      - targets: ['192.168.121.25:9100'] #Testing IP

  - job_name: 'cadvisor-server-1'
    static_configs:
      - targets: ['192.168.121.26:8080'] #Testing IP

  - job_name: 'cadvisor-server-2'
    static_configs:
      - targets: ['192.168.121.25:8080'] #Testing IP

  - job_name: 'blackbox_remote'
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 8.8.4.4
          - 1.0.0.1
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.121.25:9115 #Testing IP

  - job_name: 'blackbox_icmp'
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 8.8.8.8
          - 1.1.1.1
          - 192.168.121.26
          - 192.168.121.25
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115 #Testing IP

  - job_name: 'blackbox_tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - 192.168.121.26:22 #Testing IP
          - 192.168.121.25:22 #Testing IP 
          - google.com:443
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'blackbox_http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://google.com
          - http://github.com
          - http://192.168.121.26:9100 #Testing IP
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115


  - job_name: 'process_exporter_kali1'
    static_configs:
      - targets: ['192.168.121.26:9256'] #Testing IP

  - job_name: 'process_exporter_kali2'
    static_configs:
      - targets: ['192.168.121.25:9256']
